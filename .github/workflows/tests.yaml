name: Tests

on:
    workflow_call:

env:
    CARGO_TERM_COLOR: always
    DATABASE_URL: postgres://mango3:mango3@127.0.0.1:5432/identity_test
    MONITOR_REDIS_URL: redis://127.0.0.1:6379/10

jobs:
    unit_tests:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
            redis:
                image: redis:8-alpine
                options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - uses: taiki-e/install-action@nextest
            - uses: ./.github/actions/setup-leptos
            - name: Run all unit tests
              run: cargo nextest run --all-features --no-tests pass --no-capture

    end2end_tests:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
            redis:
                image: redis:8-alpine
                options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-leptos
            - uses: ./.github/actions/setup-node
            - name: Setup Playwright
              run: |
                  cd app/end2end
                  npm install
                  npx playwright install
                  cd ../..
            - name: Run end2end tests
              run: cargo leptos end-to-end
