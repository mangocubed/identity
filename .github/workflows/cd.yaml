name: CD

on:
    push:
        tags:
            - "v*"

    workflow_dispatch:

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    DATABASE_URL: postgres://mango3:mango3@127.0.0.1:5432/identity_test

jobs:
    build_api:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-leptos
            - run: cargo build --package identity-api --release
            - uses: actions/upload-artifact@v7
              with:
                  name: identity_api_build
                  path: ./target/release/identity-api
                  retention-days: 1

    build_app:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-leptos
            - uses: ./.github/actions/setup-node
            - run: npm run build
            - run: cargo leptos build --release
            - uses: actions/upload-artifact@v7
              with:
                  name: identity_app_build
                  path: |
                      ./target/app
                      ./target/release/identity-app
                  retention-days: 1

    build_cli:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-leptos
            - run: cargo build --package identity-cli --release
            - uses: actions/upload-artifact@v7
              with:
                  name: identity_cli_build
                  path: ./target/release/identity-cli
                  retention-days: 1

    build_monitor:
        runs-on: ubuntu-24.04
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: mango3
                    POSTGRES_PASSWORD: mango3
                    POSTGRES_DB: identity_test
                ports:
                    - 5432:5432
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-leptos
            - run: cargo build --package identity-monitor --release
            - uses: actions/upload-artifact@v7
              with:
                  name: identity_monitor_build
                  path: ./target/release/identity-monitor
                  retention-days: 1

    release:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-alpha') }}

    deploy:
        needs: [build_api, build_app, build_cli, build_monitor]
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v8
              with:
                  name: identity_api_build
                  path: builds/
            - uses: actions/download-artifact@v8
              with:
                  name: identity_app_build
                  path: builds/
            - uses: actions/download-artifact@v8
              with:
                  name: identity_cli_build
                  path: builds/
            - uses: actions/download-artifact@v8
              with:
                  name: identity_monitor_build
                  path: builds/
            - name: Run deploy script
              run: ${{ secrets.DEPLOY_SCRIPT }}
