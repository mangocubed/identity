[workspace]
resolver = "3"
members = ["app", "core"]

[workspace.package]
version = "0.0.0-alpha.0"
edition = "2024"
authors = ["Javier E. <jaedns@gmail.com>"]
homepage = "https://id.mango3.app"
repository = "https://github.com/mangocubed/identity"

[workspace.dependencies]
tokio = { version = "1.49.0", features = ["rt-multi-thread"] }
idenity-core = { path = "./core", default-features = false }
