[package]
name = "identity-app"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
axum = { version = "0.8.8", optional = true }
chrono.workspace = true
console_error_panic_hook = { version = "0.1.7", optional = true }
gloo-timers = { version = "0.3", features = ["futures"] }
http = { version = "1.4.0", optional = true }
leptos = "0.8.15"
leptos_axum = { version = "0.8.7", optional = true }
leptos_meta = "0.8.5"
leptos_router = "0.8.11"
rust_iso3166.workspace = true
serde.workspace = true
serde_json = "1.0.149"
tokio = { workspace = true, optional = true }
validator.workspace = true
wasm-bindgen = { version = "=0.2.106", optional = true }
identity-core = { workspace = true, optional = true }

[features]
hydrate = ["leptos/hydrate", "dep:console_error_panic_hook", "dep:wasm-bindgen"]
ssr = [
    "dep:axum",
    "dep:http",
    "dep:leptos_axum",
    "dep:tokio",
    "leptos/ssr",
    "leptos_meta/ssr",
    "leptos_router/ssr",
    "dep:identity-core",
]

[profile.wasm-release]
inherits = "release"
opt-level = 'z'
lto = true
codegen-units = 1
panic = "abort"

[package.metadata.leptos]
output-name = "application"
site-root = "target/app"
site-pkg-dir = "pkg"
assets-dir = "assets"
site-addr = "127.0.0.1:8000"
reload-port = 8001
end2end-cmd = "npx playwright test"
end2end-dir = "end2end"
browserquery = "defaults"
env = "DEV"
bin-features = ["ssr"]
bin-default-features = false
lib-features = ["hydrate"]
lib-default-features = false
lib-profile-release = "wasm-release"
tailwind-input-file = "style.css"
hash-files = true
hash-file-name = "hash-app.txt"
